<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE FALL: GENESIS 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --danger: #ff0055; --accent: #00ffff; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; touch-action: none; }
        #game-wrap { width: 100vw; height: 100vh; max-width: 500px; position: relative; background: #111; border-left: 5px solid #fff; border-right: 5px solid #fff; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 10px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; font-family: 'Bangers', cursive; }
        .stat { color: #fff; font-size: 1.5rem; text-shadow: 2px 2px 0 #000; }
        #death-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 4px solid var(--danger); padding: 25px; display: none; flex-direction: column; align-items: center; z-index: 200; width: 80%; border-radius: 10px; }
        #death-screen h2 { color: #fff; margin: 0; font-size: 3.5rem; font-family: 'Bangers'; text-shadow: 4px 4px 0 var(--danger); }
        .btn-retry { background: #4ade80; color: #000; width: 100%; font-size: 2rem; padding: 12px; margin-top: 15px; border: 4px solid #000; cursor: pointer; font-family: 'Bangers'; text-transform: uppercase; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="game-wrap">
        <div id="ui">
            <div class="stat">PTS: <span id="score-val">0</span></div>
            <div id="lvl-ui" class="stat" style="color:var(--danger)">CATHEDRAL</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="death-screen">
            <h2>WASTED</h2>
            <p id="final-score" style="color:var(--accent); font-size: 1.5rem; margin: 5px; font-family: 'Bangers';"></p>
            <button class="btn-retry" onclick="init()">REBOOT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const lvlEl = document.getElementById('lvl-ui');
        const deathScreen = document.getElementById('death-screen');

        let width, height, player, platforms, particles, decors, score, floorsPassed, gameActive, keys, deathTimer, currentTheme, loopId;
        const START_SPEED = 2.2; 
        const START_GAP = 330;
        let scrollSpeed = START_SPEED;
        let platformGap = START_GAP;
        let bgScroll = 0;

        const THEMES = [
            { name: "CATHEDRAL", bg: "#0d0d0d", type: "brick", spike: "#ff0055", items: ["skull", "candelabra"] },
            { name: "RAVE HOUSE", bg: "#000", type: "grid", spike: "#0f0", items: ["laser", "speaker"] },
            { name: "NEON LAB", bg: "#05001a", type: "digital", spike: "#0ff", items: ["monitor", "wire"] },
            { name: "DUNGEON", bg: "#1a0f00", type: "stone", spike: "#ff8000", items: ["torch", "bars"] },
            { name: "GRAVEYARD", bg: "#050805", type: "mist", spike: "#0ff", items: ["tombstone", "tree"] }
        ];

        function resize() {
            width = canvas.width = Math.min(window.innerWidth, 500);
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // KEYBOARD & TOUCH CONTROLS
        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space' && !gameActive) init(); });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        
        // Mobile Steering Fix
        canvas.addEventListener('touchmove', e => {
            if(gameActive) {
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                player.targetX = (touch.clientX - rect.left) * (width / rect.width);
            }
            e.preventDefault();
        }, {passive: false});

        function createDecor(y) {
            decors.push({
                x: Math.random() * (width - 100) + 50,
                y,
                type: currentTheme.items[Math.floor(Math.random() * currentTheme.items.length)],
                size: Math.random() * 30 + 40,
                rot: (Math.random() - 0.5) * 0.4
            });
        }

        function init() {
            if (loopId) cancelAnimationFrame(loopId);
            gameActive = true; score = 0; floorsPassed = 0; deathTimer = 0; 
            scrollSpeed = START_SPEED; platformGap = START_GAP;
            currentTheme = THEMES[0];
            player = { x: width/2, targetX: width/2, vx: 0, y: -80, targetY: height/2.5, state: 'intro', friction: 0.9, accel: 0.9 };
            platforms = []; particles = []; decors = []; keys = {}; 
            scoreEl.innerText = "0";
            lvlEl.innerText = currentTheme.name;
            lvlEl.style.color = currentTheme.spike;

            for(let i=0; i<8; i++) {
                let y = height + i * platformGap;
                platforms.push({ y, gapX: Math.random()*(width-160)+20, gapWidth: 140, scored: false });
                if(i % 2 === 0) createDecor(y - 170);
            }
            deathScreen.style.display = 'none';
            update();
        }

        function update() {
            if (!gameActive) {
                deathTimer++;
                if (deathTimer % 18 === 0 && deathTimer < 200) spawnBlood(player.x, player.y - 10, 10, 5, true);
                if (deathTimer === 60) {
                    document.getElementById('final-score').innerText = "PTS: " + score;
                    deathScreen.style.display = 'flex';
                }
            }

            if (player.state === 'intro') {
                player.y += (player.targetY - player.y) * 0.05;
                if (Math.abs(player.y - player.targetY) < 1) player.state = 'active';
            }

            if (gameActive) {
                // Desktop Input
                if (keys['ArrowLeft']) player.targetX -= 15;
                if (keys['ArrowRight']) player.targetX += 15;
                
                // Smooth Glide
                player.x += (player.targetX - player.x) * 0.15;
                player.x = Math.max(30, Math.min(width - 30, player.x));

                bgScroll = (bgScroll + scrollSpeed) % height;
                platforms.forEach(p => p.y -= scrollSpeed);
                decors.forEach(d => d.y -= scrollSpeed);

                platforms.forEach(p => {
                    if (player.y + 25 > p.y && player.y < p.y + 15) {
                        if (player.x > p.gapX && player.x < p.gapX + p.gapWidth) {
                            if (!p.scored) { p.scored = true; score += 10; floorsPassed++; scrollSpeed += 0.02; switchHouse(); }
                        } else {
                            gameActive = false; player.state = 'dead';
                            spawnBlood(player.x, p.y, 50, 15, false);
                        }
                    }
                });

                if (platforms[0].y < -200) {
                    platforms.shift();
                    platforms.push({ y: platforms[platforms.length-1].y + platformGap, gapX: Math.random()*(width-160)+20, gapWidth: 140, scored: false });
                }
            }
            draw();
            loopId = requestAnimationFrame(update);
        }

        function switchHouse() {
            let idx = Math.floor(floorsPassed / 10) % THEMES.length;
            currentTheme = THEMES[idx];
            lvlEl.innerText = currentTheme.name;
            lvlEl.style.color = currentTheme.spike;
        }

        function spawnBlood(x, y, count, speed, isCough) {
            for(let i=0; i<count; i++) {
                particles.push({ x, y, vx: (Math.random()-0.5)*speed, vy: (Math.random()-0.5)*speed, life: 1, size: Math.random()*4+2, isCough });
            }
        }

        function draw() {
            ctx.fillStyle = currentTheme.bg; ctx.fillRect(0, 0, width, height);
            
            ctx.strokeStyle = "rgba(255,255,255,0.05)";
            if(currentTheme.type === "grid") {
                for(let i=0; i<width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,height); ctx.stroke(); }
            }

            platforms.forEach(p => {
                ctx.fillStyle = "#000"; ctx.fillRect(0, p.y, p.gapX, 25);
                ctx.fillRect(p.gapX + p.gapWidth, p.y, width, 25);
                ctx.fillStyle = currentTheme.spike;
                for(let i=0; i<width; i+=15) {
                    if (i < p.gapX || i > p.gapX + p.gapWidth) {
                        ctx.beginPath(); ctx.moveTo(i, p.y); ctx.lineTo(i+7, p.y-22); ctx.lineTo(i+14, p.y); ctx.fill();
                    }
                }
            });

            ctx.save(); ctx.translate(player.x, player.y);
            if (!gameActive) ctx.rotate(Math.PI / 1.7);
            ctx.strokeStyle = gameActive ? "#fff" : "#f00";
            ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(0, -15, 8, 0, Math.PI*2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(0, 15); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(-15, 5); ctx.lineTo(15, 5); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-10, 30); ctx.moveTo(0, 15); ctx.lineTo(10, 30); ctx.stroke();
            ctx.restore();

            particles.forEach((p, i) => {
                ctx.fillStyle = `rgba(180, 0, 0, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                p.x += p.vx; p.y += p.vy; if (p.isCough || !gameActive) p.vy += 0.2; p.life -= 0.015;
                if (p.life <= 0) particles.splice(i, 1);
            });
            scoreEl.innerText = score;
        }

        init();
    </script>
</body>
</html>
