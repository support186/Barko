<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARKOUR: Apocalypse</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #ff0055; --bg: #050505; --neon: #00ffff; --yellow: #ffe600; }
        body { margin: 0; padding: 0; height: 100vh; overflow: hidden; background: var(--bg); font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px; }
        #game-container { width: 100%; max-width: 600px; height: 100%; display: flex; flex-direction: column; border: 6px solid #fff; position: relative; overflow: hidden; box-shadow: 10px 10px 0px var(--accent); }
        
        /* HUD */
        #hud { height: 50px; background: var(--yellow); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; color: #000; font-family: 'Bangers'; font-size: 1.5rem; border-bottom: 6px solid #fff; z-index: 50; }
        
        /* STAGE */
        #stage { flex-grow: 1; position: relative; overflow: hidden; transition: background 0.5s; border-bottom: 6px solid #fff; }
        
        /* Dog POV */
        #dog-pov { position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%); width: 150px; height: 170px; z-index: 100; pointer-events: none; }
        .dog-body { position: absolute; bottom: 0; left: 25px; width: 100px; height: 120px; background: #000; border-radius: 50px 50px 10px 10px; border: 5px solid #fff; }
        .dog-head { position: absolute; top: 15px; left: 35px; width: 80px; height: 80px; background: #000; border-radius: 50%; border: 5px solid #fff; z-index: 2; }
        .dog-tail { position: absolute; bottom: 80px; left: 65px; width: 20px; height: 80px; background: #000; border: 4px solid #fff; border-radius: 10px; transform-origin: bottom center; animation: wag 0.2s infinite alternate linear; }
        @keyframes wag { 0% { transform: rotate(-30deg); } 100% { transform: rotate(30deg); } }

        /* Hotspots */
        .hotspot { position: absolute; font-family: 'Bangers'; font-size: 1.5rem; background: #fff; color: #000; border: 3px solid #000; padding: 5px 10px; cursor: pointer; box-shadow: 4px 4px 0px #000; transform: translate(-50%, -50%); transition: 0.1s; }
        .hotspot:active { transform: translate(-50%, -50%) scale(0.9); }

        /* CONTROLS */
        #controls { background: #111; padding: 15px; display: flex; flex-direction: column; gap: 10px; height: 260px; }
        #narrator { background: #000; color: #fff; padding: 12px; border: 3px solid #fff; font-size: 1.1rem; min-height: 60px; box-shadow: 4px 4px 0px var(--neon); overflow-y: auto; }
        #button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #fff; color: #000; border: 3px solid #000; font-family: 'Bangers'; font-size: 1.4rem; cursor: pointer; padding: 8px; box-shadow: 4px 4px 0px #000; }
        .btn:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .btn-move { background: #00ff00; }
        .btn-danger { background: var(--accent); color: white; }
        
        /* Animations */
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div>HP: <span id="hp">100</span></div>
            <div id="inv">🎒 EMPTY</div>
        </div>
        <div id="stage">
            <div id="hotspot-layer"></div>
            <div id="dog-pov">
                <div class="dog-tail"></div>
                <div class="dog-head"></div>
                <div class="dog-body"></div>
            </div>
        </div>
        <div id="controls">
            <div id="narrator">Welcome to the end of the world, Good Boy. Click a target to begin.</div>
            <div id="button-grid"></div>
        </div>
    </div>

    <script>
        let state = { hp: 100, inventory: [], location: 'apt' };

        const scenes = {
            apt: { text: "START: Your apartment. The humans are gone. The kibble is empty.", color: "#4e54c8", items: [
                { name: "THE DOOR", x: "50%", y: "40%", options: [
                    { text: "SCRATCH", type: "move", next: "hall", msg: "You claw through the wood! Freedom!" },
                    { text: "BARK", msg: "Silence echoes back. No one is coming." },
                    { text: "PEE", msg: "The expensive rug is now yours." },
                    { text: "CHEW SHOE", item: "Leather Lace", msg: "Delicious leather. You feel rebellious." }
                ]}]},
            hall: { text: "HALLWAY: Dim lights. A vacuum hums. The cat next door is watching.", color: "#2c3e50", items: [
                { name: "CAT", x: "70%", y: "50%", options: [
                    { text: "CHASE", type: "move", next: "elev", msg: "You chase the cat into the open elevator!" },
                    { text: "HISS", damage: 10, msg: "The cat swipes your nose! Ouch." },
                    { text: "WAG", msg: "The cat judges you silently." },
                    { text: "SNIFF", msg: "Smells like fish and arrogance." }
                ]}]},
            elev: { text: "ELEVATOR: Going down. Smooth music plays while the world burns.", color: "#7f8c8d", items: [
                { name: "BUTTONS", x: "80%", y: "40%", options: [
                    { text: "PRESS LOBBY", type: "move", next: "lobby", msg: "Ding! Ground floor." },
                    { text: "LICK BUTTON", damage: 5, msg: "Tastes like electricity. -5 HP" },
                    { text: "HOWL", msg: "The acoustics here are amazing." },
                    { text: "SIT", msg: "You are a very patient boy." }
                ]}]},
            lobby: { text: "LOBBY: The glass doors are cracked. The city awaits.", color: "#16a085", items: [
                { name: "DOORMAN", x: "30%", y: "50%", options: [
                    { text: "SNEAK PAST", type: "move", next: "street", msg: "You slip past his snoring form." },
                    { text: "BITE ANKLE", type: "danger", damage: 20, msg: "He kicks you! RUN!" },
                    { text: "BE CUTE", item: "Hat", msg: "He puts his hat on you. You look dapper." },
                    { text: "BARK", msg: "He wakes up and chases you outside!" }
                ]}]},
            street: { text: "MAIN ST: Total chaos. Abandoned cars and pigeons everywhere.", color: "#2980b9", items: [
                { name: "PIGEONS", x: "50%", y: "70%", options: [
                    { text: "HUNT", item: "Feather", msg: "You caught one! Well, just a feather." },
                    { text: "BARK", msg: "They fly away, mocking you." },
                    { text: "EAT TRASH", damage: 10, msg: "Bad pizza. Very bad pizza." },
                    { text: "GO PARK", type: "move", next: "park", msg: "You follow the smell of grass." }
                ]}]},
            park: { text: "THE PARK: The last green spot in the city.", color: "#27ae60", items: [
                { name: "PICNIC", x: "40%", y: "60%", options: [
                    { text: "STEAL HAM", item: "Ham", msg: "Glorious meat acquired!" },
                    { text: "PEE BASKET", damage: 15, msg: "The dad throws a frisbee at your head!" },
                    { text: "BEG", health: 20, msg: "They share a sandwich. +20 HP" },
                    { text: "GO ALLEY", type: "move", next: "alley", msg: "You spot a shortcut." }
                ]}]},
            alley: { text: "ALLEY: Dark and wet. A dumpster looms over you.", color: "#2c3e50", items: [
                { name: "DUMPSTER", x: "50%", y: "50%", options: [
                    { text: "JUMP IN", item: "Glowing Key", msg: "You found a key in the sludge!" },
                    { text: "SNIFF", msg: "Smells like 'Danger'." },
                    { text: "GO SUBWAY", type: "move", next: "subway", msg: "You head down the stairs." },
                    { text: "HIDE", msg: "You feel invisible here." }
                ]}]},
            subway: { text: "SUBWAY: The trains are silent. Shadows move on the tracks.", color: "#000", items: [
                { name: "SHADOWS", x: "30%", y: "70%", options: [
                    { text: "FIGHT", damage: 30, msg: "It was a rat king! You barely survived." },
                    { text: "SNEAK", type: "move", next: "lab", msg: "You follow the tracks to a secret door." },
                    { text: "HOWL", msg: "The echoes are terrifying." },
                    { text: "FIND FOOD", item: "Rat Tail", msg: "Gross, but it's food." }
                ]}]},
            lab: { text: "SECRET LAB: Glowing tubes and science stuff.", color: "#8e44ad", items: [
                { name: "THE TUBE", x: "50%", y: "40%", options: [
                    { text: "SMASH", type: "move", next: "petstore", msg: "Alarms blare! The gas makes you feel strong." },
                    { text: "DRINK FLUID", damage: 50, msg: "It's radioactive juice! -50 HP" },
                    { text: "BARK", msg: "The computer bleeps at you." },
                    { text: "SIT", msg: "The floor is uncomfortably cold." }
                ]}]},
            petstore: { text: "PET STORE: Cages line the walls. Your brothers are trapped.", color: "#d35400", items: [
                { name: "CAGE LOCK", x: "40%", y: "50%", options: [
                    { text: "USE KEY", type: "move", next: "rooftop", msg: "The puppies are free! We ride to the roof!" },
                    { text: "BITE LOCK", damage: 10, msg: "Metal wins. Your jaw hurts." },
                    { text: "WHINE", msg: "They whine back. It's heartbreaking." },
                    { text: "BARK", msg: "The noise is deafening." }
                ]}]},
            rooftop: { text: "ROOFTOP: The final climb. The helicopter is waiting.", color: "#c0392b", items: [
                { name: "BOSS CAT", x: "50%", y: "30%", options: [
                    { text: "ULTIMATE BARK", type: "move", next: "beach", msg: "The cat falls! The path is clear!" },
                    { text: "TACKLE", damage: 40, msg: "A brutal fight on the edge!" },
                    { text: "USE HAM", msg: "The cat eats the ham and leaves. Smart." },
                    { text: "WAG", msg: "The cat just laughs at you." }
                ]}]},
            beach: { text: "THE BEACH: You made it. The apocalypse can't find you here.", color: "#f1c40f", items: [
                { name: "THE OCEAN", x: "50%", y: "60%", options: [
                    { text: "WIN!", msg: "You are the best boy in history." },
                    { text: "WIN!", msg: "You are the best boy in history." },
                    { text: "WIN!", msg: "You are the best boy in history." },
                    { text: "WIN!", msg: "You are the best boy in history." }
                ]}]}
        };

        function render() {
            const scene = scenes[state.location];
            document.getElementById('stage').style.background = scene.color || "#000";
            document.getElementById('narrator').innerText = scene.text;
            document.getElementById('health-val').innerText = state.hp;
            document.getElementById('inventory-val').innerText = state.inventory.join(", ") || "EMPTY";
            
            const layer = document.getElementById('hotspot-layer');
            layer.innerHTML = "";
            scene.items.forEach(item => {
                const div = document.createElement('div');
                div.className = "hotspot";
                div.style.left = item.x;
                div.style.top = item.y;
                div.onclick = () => showActions(item);
                layer.appendChild(div);
            });
            document.getElementById('button-grid').innerHTML = "";
        }
        
        // This is a simplified render; the real logic is in the button clicks below
        function render() {
            const scene = scenes[state.location];
            document.getElementById('stage').style.background = scene.color || scene.bg;
            document.getElementById('narrator').innerText = scene.text;
            document.getElementById('health-val').innerText = state.hp;
            document.getElementById('inventory-val').innerText = state.inventory.join(", ") || "EMPTY";
            
            const layer = document.getElementById('items-container');
            layer.innerHTML = "";
            scene.items.forEach(item => {
                const div = document.createElement('div');
                div.className = "interactable";
                div.style.left = item.x;
                div.style.top = item.y;
                div.innerText = item.icon;
                div.onclick = () => showActions(item);
                layer.appendChild(div);
            });
            document.getElementById('button-grid').innerHTML = "";
        }

        function showActions(item) {
            document.getElementById('narrator').innerText = "TARGET: " + item.name;
            const grid = document.getElementById('button-grid');
            grid.innerHTML = "";
            item.options.forEach(opt => {
                const b = document.createElement('button');
                b.className = "btn " + (opt.type ? "btn-" + opt.type : "btn-action");
                b.innerText = opt.text;
                b.onclick = () => {
                    if(opt.damage) { 
                        state.hp -= opt.damage;
                        triggerShake();
                    }
                    if(opt.health) state.hp += opt.health;
                    if(opt.item) state.inventory.push(opt.item);
                    if(opt.next) state.location = opt.next;
                    document.getElementById('narrator').innerText = opt.msg;
                    setTimeout(render, 1500);
                };
                grid.appendChild(b);
            });
        }

        startGame();
    </script>
</body>
</html>
