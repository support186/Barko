<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atmospheric Descent</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; text-shadow: 2px 2px 4px #000; }
        #reboot-btn { position: absolute; bottom: 20px; right: 20px; padding: 10px 20px; background: rgba(255,255,255,0.2); color: white; border: 1px solid white; cursor: pointer; pointer-events: auto; }
    </style>
</head>
<body>

<div id="ui">
    <div id="floor-name">LOADING...</div>
    <div id="score">FLOOR: 0</div>
</div>
<button id="reboot-btn" onclick="resetGame()">REBOOT SYSTEM</button>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const floorNameUI = document.getElementById('floor-name');
const scoreUI = document.getElementById('score');

// --- GAME CONFIG ---
let width, height;
let player = { x: 0, y: 100, r: 15, targetX: 0, speed: 0.15 };
let platforms = [];
let frame = 0;
let gameSpeed = 3; // Faster start
let currentFloor = 0;
let gameOver = false;

const THEMES = [
    { name: "01: OVERGROWN LAB", bg: "#0a120a", accent: "#4ade80", decor: "vines", particles: "fog" },
    { name: "02: INDUSTRIAL STEAM", bg: "#1a110a", accent: "#fb923c", decor: "chains", particles: "steam" },
    { name: "03: VOID LIBRARY", bg: "#0f172a", accent: "#818cf8", decor: "banners", particles: "dust" },
    { name: "04: CYBER BASEMENT", bg: "#020617", accent: "#22d3ee", decor: "cables", particles: "glitch" },
    { name: "05: SUBMERGED ENGINE", bg: "#064e3b", accent: "#34d399", decor: "hoses", particles: "bubbles" },
    { name: "06: VICTORIAN CLOCK", bg: "#2d1b09", accent: "#facc15", decor: "gears", particles: "gold" },
    { name: "07: BIOLUMINESCENT HIVE", bg: "#2e1065", accent: "#d946ef", decor: "pods", particles: "spores" },
    { name: "08: DATA GRAVEYARD", bg: "#000000", accent: "#ffffff", decor: "code", particles: "noise" },
    { name: "09: ALCHEMIST SOLARIUM", bg: "#f8fafc", accent: "#38bdf8", decor: "prisms", particles: "petals" },
    { name: "10: THE CORE", bg: "#450a0a", accent: "#f87171", decor: "rebar", particles: "embers" }
];

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    player.x = width / 2;
    player.targetX = player.x;
    resetGame();
}

function resetGame() {
    platforms = [];
    currentFloor = 0;
    gameSpeed = 4;
    gameOver = false;
    // Initial platforms
    for(let i=0; i<6; i++) {
        addPlatform(200 * i + 300);
    }
}

function addPlatform(y) {
    const themeIdx = Math.floor(currentFloor / 5) % THEMES.length;
    const holeWidth = 80 - (Math.min(currentFloor, 20)); // Holes get smaller
    platforms.push({
        y: y,
        holeX: Math.random() * (width - holeWidth),
        holeW: holeWidth,
        theme: THEMES[themeIdx],
        passed: false,
        seed: Math.random() * 100 // For unique hanging decor
    });
}

// --- INPUT HANDLING (MOBILE + DESKTOP) ---
window.addEventListener('mousemove', e => player.targetX = e.clientX);
window.addEventListener('touchmove', e => {
    e.preventDefault();
    player.targetX = e.touches[0].clientX;
}, { passive: false });

function update() {
    if (gameOver) return;

    // Smooth movement
    player.x += (player.targetX - player.x) * player.speed;

    // Move platforms up
    platforms.forEach(p => {
        p.y -= gameSpeed;
    });

    // Collision & Scoring
    if (platforms.length > 0) {
        let p = platforms[0];
        
        // If player is at the platform's Y level
        if (Math.abs(player.y - p.y) < 10) {
            const inHole = player.x > p.holeX && player.x < p.holeX + p.holeW;
            if (!inHole) {
                // Hit the floor (Ceiling of the one below)
                player.y = p.y - 15; // Push player up
                if (player.y < 0) gameOver = true; // Crushed!
            } else if (!p.passed) {
                p.passed = true;
                currentFloor++;
                gameSpeed += 0.05; // Natural acceleration
            }
        }
    }

    // Cycle platforms
    if (platforms[0].y < -20) {
        platforms.shift();
        addPlatform(platforms[platforms.length-1].y + 200);
    }

    // UI Update
    const currentTheme = platforms[0].theme;
    floorNameUI.innerText = currentTheme.name;
    floorNameUI.style.color = currentTheme.accent;
    scoreUI.innerText = `FLOOR: ${currentFloor}`;
}

function draw() {
    const theme = platforms[0].theme;
    ctx.fillStyle = theme.bg;
    ctx.fillRect(0, 0, width, height);

    // Draw Parallax Decor (Hanging stuff)
    platforms.forEach(p => {
        ctx.strokeStyle = p.theme.accent;
        ctx.lineWidth = 2;
        
        // Draw the Floor/Ceiling
        ctx.globalAlpha = 1.0;
        ctx.beginPath();
        ctx.moveTo(0, p.y);
        ctx.lineTo(p.holeX, p.y);
        ctx.moveTo(p.holeX + p.holeW, p.y);
        ctx.lineTo(width, p.y);
        ctx.stroke();

        // Draw Hanging Decor (Atmosphere)
        // Since this is the ceiling to the level below:
        ctx.globalAlpha = 0.4;
        let sway = Math.sin(frame * 0.02 + p.seed) * 15;
        
        ctx.beginPath();
        // Visualizing "hanging stuff" every 100px
        for(let i=0; i<width; i+=120) {
            if(i < p.holeX || i > p.holeX + p.holeW) {
                ctx.moveTo(i, p.y);
                ctx.quadraticCurveTo(i + sway, p.y + 50, i + sway/2, p.y + 100);
            }
        }
        ctx.stroke();
    });

    // Draw Player
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = "#fff";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#fff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    frame++;
    requestAnimationFrame(() => {
        update();
        draw();
    });
}

window.addEventListener('resize', init);
init();
draw();

</script>
</body>
</html>
