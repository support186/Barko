<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Barkour: A Good Boy's Guide</title>
    <style>
        /* --- GLOBAL & RESPONSIVE STYLES --- */
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            background-color: #cbd5e1; /* Soft gray for desktop background */
            display: flex; justify-content: center; align-items: center;
            touch-action: manipulation; user-select: none;
        }

        /* The Game Window - Adapts to PC and Mobile */
        #game-container {
            width: 100%; max-width: 800px; /* Big on PC */
            height: 100%; max-height: 1000px; 
            display: flex; flex-direction: column;
            background: #f8fafc; position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* --- 1. THE HUD (Friendly Floating Pill) --- */
        #hud {
            height: 60px; background: white; display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 25px; color: #334155; font-size: 1.4rem; font-weight: 800;
            margin: 15px; border-radius: 40px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.06); z-index: 50;
        }

        /* --- 2. THE STAGE (Cartoon Viewfinder) --- */
        #stage {
            flex-grow: 1; position: relative; overflow: hidden;
            margin: 0 15px; border-radius: 30px; 
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 15px 35px rgba(0,0,0,0.08);
            border: 4px solid white; transition: background 0.5s ease;
        }

        /* Bouncy Cartoon Items */
        .interactable {
            position: absolute; font-size: 5rem; cursor: pointer;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            transform: translate(-50%, -50%);
            animation: bounce 3s ease-in-out infinite;
            transition: transform 0.2s;
        }
        .interactable:active { transform: translate(-50%, -50%) scale(0.8); }
        
        @keyframes bounce {
            0% { top: calc(var(--y) - 5px); }
            50% { top: calc(var(--y) + 10px); }
            100% { top: calc(var(--y) - 5px); }
        }

        /* --- THE DOG (Cartoon Over-The-Tail POV) --- */
        #dog-pov {
            position: absolute; bottom: -15px; left: 50%;
            transform: translateX(-50%); width: 130px; height: 160px; z-index: 100;
            filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2)); pointer-events: none;
        }
        .dog-body {
            position: absolute; bottom: 0; left: 15px;
            width: 100px; height: 110px; background: #d97706; 
            border-radius: 50px 50px 15px 15px; border: 5px solid #78350f;
        }
        .dog-head {
            position: absolute; top: 15px; left: 25px;
            width: 80px; height: 80px; background: #f59e0b;
            border-radius: 50%; border: 5px solid #78350f; z-index: 2;
        }
        .dog-ears {
            position: absolute; top: 10px; left: 10px; width: 110px;
            display: flex; justify-content: space-between; z-index: 1;
        }
        .ear {
            width: 35px; height: 50px; background: #78350f;
            border-radius: 50% 50% 15px 15px;
        }
        .dog-tail {
            position: absolute; bottom: 70px; left: 55px;
            width: 22px; height: 80px; background: #f59e0b;
            border-radius: 15px; border: 4px solid #78350f;
            transform-origin: bottom center;
            animation: wag 0.12s infinite alternate ease-in-out;
            z-index: -1;
        }
        @keyframes wag { 0% { transform: rotate(-40deg); } 100% { transform: rotate(40deg); } }

        /* --- 3. THE CONTROL PANEL (Squishy & Friendly) --- */
        #controls {
            background: white; padding: 25px 20px;
            display: flex; flex-direction: column; gap: 20px;
            border-radius: 40px 40px 0 0; 
            box-shadow: 0 -15px 40px rgba(0,0,0,0.08);
            margin-top: -20px; z-index: 10; position: relative;
        }

        #narrator {
            background: #f1f5f9; color: #334155; 
            padding: 20px; border-radius: 25px; 
            font-size: 1.15rem; font-weight: 800; line-height: 1.5;
            min-height: 60px; text-align: center; border: 2px solid #e2e8f0;
        }
        .highlight { color: #f59e0b; font-weight: 900; }

        #button-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .btn {
            color: white; border: none; border-radius: 50px; 
            font-size: 1.15rem; font-weight: 900; letter-spacing: 0.5px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            padding: 18px 10px; transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: translateY(6px); box-shadow: 0 0px 0 transparent !important; }

        /* Candy Button Themes */
        .btn-action { background: #fb7185; box-shadow: 0 6px 0 #e11d48; } 
        .btn-move { background: #38bdf8; box-shadow: 0 6px 0 #0284c7; } 
        .btn-danger { background: #c084fc; box-shadow: 0 6px 0 #9333ea; } 
        .btn-back { background: #94a3b8; box-shadow: 0 6px 0 #64748b; }

        /* Game Over Screen */
        #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 999; display: none;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
            backdrop-filter: blur(10px);
        }
        #game-over h1 { color: #e11d48; font-size: 50px; font-weight: 900; margin-bottom: 10px; }

        /* PC specific tweaks */
        @media (min-width: 601px) {
            #game-container { border-radius: 20px; height: 90vh; }
            .interactable { font-size: 6rem; } /* Slightly bigger items on PC */
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="hud">
            <div>❤️ <span id="health-val">100</span></div>
            <div>🎒 <span id="inventory-val">Empty</span></div>
        </div>

        <div id="stage">
            <div id="items-container"></div>
            <div id="dog-pov">
                <div class="dog-tail"></div>
                <div class="dog-ears">
                    <div class="ear"></div>
                    <div class="ear"></div>
                </div>
                <div class="dog-head"></div>
                <div class="dog-body"></div>
            </div>
        </div>

        <div id="controls">
            <div id="narrator">Loading the Apocalypse...</div>
            <div id="button-grid"></div>
        </div>

        <div id="game-over">
            <h1>YOU DIED</h1>
            <p style="font-size: 1.2rem; color: #333; font-weight: bold; margin-bottom: 30px;">A very bad dog ending.</p>
            <button class="btn btn-move" style="padding: 15px 40px;" onclick="startGame()">↻ RESTART GAME</button>
        </div>

    </div>

    <script>
        // --- PHASE 3: THE CARTOON STATE MACHINE ---
        // Instead of photo URLs, we use beautiful CSS Gradients (bg) and Emojis (icon).
        
        const worldData = {
            "home": {
                bg: "linear-gradient(to bottom, #fef08a 50%, #fde047 50%)", // Yellow room
                introText: "You are Home. The air smells like stale kibble and safety.",
                items: [
                    {
                        name: "Front Door", icon: "🚪", x: "50%", y: "40%",
                        actions: [
                            { label: "Scratch", type: "move", result: "The human opens the door. You run out!", targetScene: "park" },
                            { label: "Bite Knob", type: "danger", result: "You chip a tooth.", damage: 10 },
                            { label: "Pee on Mat", type: "action", result: "Territory secured. The human sighs loudly." }
                        ]
                    },
                    {
                        name: "Roomba", icon: "🤖", x: "80%", y: "70%",
                        actions: [
                            { label: "Bark", type: "action", result: "It wakes up and starts cleaning in fear." },
                            { label: "Ride", type: "action", result: "You surf the robot across the living room." }
                        ]
                    }
                ]
            },
            "park": {
                bg: "linear-gradient(to bottom, #7dd3fc 45%, #86efac 45%)", // Sky to Grass
                introText: "The Park. The smell of squirrels and ancient rivalries fills your nose.",
                items: [
                    {
                        name: "Old Couple", icon: "👵👴", x: "25%", y: "45%",
                        actions: [
                            { label: "Bark Loudly", type: "danger", result: "Heart attack! Animal control arrives. You are taken to Jail.", targetScene: "pound" },
                            { label: "Be Cute", type: "action", result: "They pet you! You steal their house keys.", giveItem: "Keys" },
                            { label: "Hump Leg", type: "danger", result: "You get pepper-sprayed!", damage: 20 }
                        ]
                    },
                    {
                        name: "Big Tree", icon: "🌳", x: "75%", y: "35%",
                        actions: [
                            { label: "Sniff", type: "action", result: "Smells like a Golden Retriever was here 2 hours ago." },
                            { label: "Dig", type: "action", result: "You found a buried diamond ring!", giveItem: "Ring" }
                        ]
                    },
                    {
                        name: "Stranger's House", icon: "🏡", x: "85%", y: "60%",
                        actions: [
                            { label: "Enter Door", type: "move", result: "You approach the mysterious house...", targetScene: "strangerHouse", requireItem: "Keys" }
                        ]
                    }
                ]
            },
            "pound": {
                bg: "linear-gradient(to bottom, #94a3b8 50%, #64748b 50%)", // Gloomy Grey Jail
                introText: "The Pound. Cold cages. Despair. You must escape.",
                items: [
                    {
                        name: "Sleeping Guard", icon: "👮", x: "50%", y: "40%",
                        actions: [
                            { label: "Lick Face", type: "action", result: "He wakes up, pets you, and goes back to sleep." },
                            { label: "Bite Crotch", type: "danger", result: "Extreme violence! He drops his keys and runs. You are free!", targetScene: "park" }
                        ]
                    },
                    {
                        name: "Rabid Pitbull", icon: "🐺", x: "25%", y: "60%",
                        actions: [
                            { label: "Growl", type: "action", result: "He whimpers. You are the Alpha now." }
                        ]
                    }
                ]
            },
            "strangerHouse": {
                bg: "linear-gradient(to bottom, #fbcfe8 30%, #f472b6 30%)", // Fancy pink walls/carpet
                introText: "You used the stolen keys. It's fancy. Very pee-able.",
                items: [
                    {
                        name: "Persian Rug", icon: "🖧", x: "50%", y: "70%",
                        actions: [
                            { label: "Vomit", type: "action", result: "You ruin the $10,000 rug. You feel amazing.", heal: 20 },
                            { label: "Sleep", type: "action", result: "Very soft.", heal: 10 }
                        ]
                    },
                    {
                        name: "Back Window", icon: "🪟", x: "80%", y: "30%",
                        actions: [
                            { label: "Jump Out", type: "move", result: "You escape into the back alley.", targetScene: "alley" }
                        ]
                    }
                ]
            },
            "alley": {
                bg: "linear-gradient(to bottom, #1e293b 60%, #0f172a 60%)", // Dark night alley
                introText: "A dark alleyway. Smells like garbage and opportunity.",
                items: [
                    {
                        name: "Dead Skunk", icon: "🦨", x: "30%", y: "70%",
                        actions: [
                            { label: "Roll in it", type: "action", result: "You smell horrific. You are invincible." }
                        ]
                    },
                    {
                        name: "Go to Park", icon: "🛣️", x: "70%", y: "40%",
                        actions: [
                            { label: "Waddle Away", type: "move", result: "You head back to the park.", targetScene: "park" }
                        ]
                    }
                ]
            }
        };

        // --- PHASE 2: THE GAME ENGINE (JAVASCRIPT) ---
        let health = 100;
        let inventory = [];
        let currentSceneId = "home";

        const elements = {
            stage: document.getElementById('stage'),
            itemsContainer: document.getElementById('items-container'),
            narrator: document.getElementById('narrator'),
            buttons: document.getElementById('button-grid'),
            health: document.getElementById('health-val'),
            inv: document.getElementById('inventory-val'),
            gameOver: document.getElementById('game-over')
        };

        function startGame() {
            health = 100; inventory = []; currentSceneId = "home";
            elements.gameOver.style.display = "none";
            updateHUD(); loadScene(currentSceneId);
        }

        function updateHUD() {
            elements.health.innerText = health;
            elements.inv.innerText = inventory.length > 0 ? inventory.join(', ') : "Empty";
            if (health <= 0) elements.gameOver.style.display = "flex";
        }

        function loadScene(sceneId) {
            currentSceneId = sceneId;
            const scene = worldData[sceneId];
            
            // Set colorful cartoon background
            elements.stage.style.background = scene.bg;
            
            elements.narrator.innerHTML = `<span class="highlight">LOCATION:</span> ${scene.introText}`;
            elements.itemsContainer.innerHTML = ''; 

            // Create bouncy emoji characters
            scene.items.forEach((item) => {
                const sprite = document.createElement('div');
                sprite.className = 'interactable';
                sprite.innerText = item.icon;
                // Pass the Y variable to CSS so the bounce animation centers correctly
                sprite.style.setProperty('--y', item.y);
                sprite.style.left = item.x; 
                sprite.style.top = item.y;
                
                sprite.onclick = () => focusItem(item);
                elements.itemsContainer.appendChild(sprite);
            });

            // Default wandering buttons
            elements.buttons.innerHTML = `
                <button class="btn btn-action" onclick="loadScene('${sceneId}')">🐾 Sniff Air</button>
                <button class="btn btn-action" onclick="loadScene('${sceneId}')">🐕 Scratch Ear</button>
            `;
        }

        function focusItem(item) {
            elements.narrator.innerHTML = `You inspect the <span class="highlight">${item.name}</span>.`;
            elements.buttons.innerHTML = '';

            item.actions.forEach(act => {
                const btn = document.createElement('button');
                btn.className = `btn btn-${act.type}`;
                btn.innerText = act.label;
                btn.onclick = () => executeAction(act);
                elements.buttons.appendChild(btn);
            });
            
            // Back button
            const backBtn = document.createElement('button');
            backBtn.className = 'btn btn-back'; backBtn.innerText = '✖ BACK AWAY';
            backBtn.onclick = () => loadScene(currentSceneId);
            elements.buttons.appendChild(backBtn);
        }

        function executeAction(act) {
            // Check inventory locks
            if (act.requireItem && !inventory.includes(act.requireItem)) {
                elements.narrator.innerHTML = `You try to ${act.label}, but you need the <span class="highlight">${act.requireItem}</span>!`;
                return;
            }

            elements.narrator.innerHTML = act.result;

            if (act.damage) health -= act.damage;
            if (act.heal) { health += act.heal; if(health>100) health=100; }
            if (act.giveItem && !inventory.includes(act.giveItem)) inventory.push(act.giveItem);
            
            updateHUD();

            if (health > 0 && act.targetScene) {
                // Remove buttons to force the player to read the transition text
                elements.buttons.innerHTML = ''; 
                setTimeout(() => loadScene(act.targetScene), 2000); 
            }
        }

        // Boot the game
        startGame();

    </script>
</body>
</html>
