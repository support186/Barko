<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BARKOUR: The Living Park</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL STYLES --- */
        body {
            margin: 0; padding: 0; height: 100vh; overflow: hidden;
            background-color: #111; display: flex; justify-content: center; align-items: center;
            font-family: 'Space Grotesk', sans-serif; touch-action: manipulation; user-select: none;
        }

        #game-container {
            width: 100%; max-width: 600px; height: 100%; max-height: 900px; 
            display: flex; flex-direction: column; background: #000; 
            border: 4px solid #fff; box-shadow: 8px 8px 0px #ff0055;
            position: relative; overflow: hidden;
        }

        /* --- THE STAGE (The Animated World) --- */
        #stage {
            flex-grow: 1; position: relative; overflow: hidden;
            background: linear-gradient(to bottom, #87CEEB 0%, #E0F6FF 50%, #7CFC00 50%, #32CD32 100%);
            border-bottom: 4px solid #fff;
        }

        /* Ambient Animations */
        #sun {
            position: absolute; top: 10%; right: 10%; width: 80px; height: 80px;
            background: #FFD700; border-radius: 50%; box-shadow: 0 0 40px #FFD700;
            animation: pulse-sun 4s infinite alternate;
        }
        @keyframes pulse-sun { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }

        #clouds {
            position: absolute; top: 15%; left: -100px; width: 120px; height: 40px;
            background: white; border-radius: 20px; opacity: 0.8;
            animation: drift 20s linear infinite;
        }
        #clouds::before, #clouds::after {
            content: ''; position: absolute; background: white; border-radius: 50%;
        }
        #clouds::before { width: 60px; height: 60px; top: -30px; left: 15px; }
        #clouds::after { width: 50px; height: 50px; top: -20px; left: 60px; }

        @keyframes drift { 0% { left: -150px; } 100% { left: 100%; } }

        /* --- THE ACTORS (CSS Drawn Characters) --- */

        /* 1. The Old Man on a Bench */
        #old-man-container {
            position: absolute; top: 40%; left: 20%;
            cursor: pointer; z-index: 10;
        }
        #bench {
            width: 120px; height: 20px; background: #8B4513; border: 2px solid #000;
            position: absolute; top: 60px; border-radius: 5px;
        }
        #old-man {
            position: relative; width: 50px; height: 70px;
            animation: nod 3s infinite ease-in-out;
        }
        .om-head {
            width: 30px; height: 30px; background: #FFDAB9; border: 2px solid #000;
            border-radius: 50%; position: absolute; top: 0; left: 10px;
        }
        .om-body {
            width: 40px; height: 40px; background: #4682B4; border: 2px solid #000;
            border-radius: 10px 10px 0 0; position: absolute; top: 25px; left: 5px;
        }
        .om-cane {
            width: 4px; height: 50px; background: #000; position: absolute;
            top: 25px; left: 45px; transform: rotate(15deg);
        }
        @keyframes nod {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(5deg); }
        }

        /* 2. The Distracting Squirrel */
        #squirrel {
            position: absolute; top: 55%; left: -50px; width: 30px; height: 20px;
            background: #A0522D; border: 2px solid #000; border-radius: 10px 15px 5px 5px;
            z-index: 15; cursor: pointer;
            animation: scurry 8s linear infinite;
        }
        #squirrel::after {
            content: ''; position: absolute; right: -15px; top: -10px;
            width: 20px; height: 25px; background: #A0522D; border: 2px solid #000;
            border-radius: 50%; transform: rotate(45deg);
        }
        @keyframes scurry {
            0% { left: -50px; transform: scaleX(1); }
            45% { left: 110%; transform: scaleX(1); }
            50% { left: 110%; transform: scaleX(-1); } /* Turn around */
            95% { left: -50px; transform: scaleX(-1); }
            100% { left: -50px; transform: scaleX(1); }
        }

        /* --- THE PLAYER (The Dog) --- */
        #dog-pov {
            position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 140px; height: 160px; z-index: 100; pointer-events: none;
            animation: breathe 2s infinite ease-in-out; /* Breathing animation */
        }
        @keyframes breathe {
            0%, 100% { transform: translateX(-50%) scaleY(1); }
            50% { transform: translateX(-50%) scaleY(1.02); }
        }
        .dog-body {
            position: absolute; bottom: 0; left: 20px; width: 100px; height: 110px; 
            background: #D2691E; border-radius: 50px 50px 10px 10px; border: 4px solid #000;
        }
        .dog-ears {
            position: absolute; top: 15px; left: 10px; width: 120px;
            display: flex; justify-content: space-between; z-index: 1;
        }
        .ear {
            width: 35px; height: 55px; background: #8B4513; border: 4px solid #000;
            border-radius: 50% 50% 10px 10px;
        }
        .dog-tail {
            position: absolute; bottom: 70px; left: 55px; width: 20px; height: 80px; 
            background: #D2691E; border: 4px solid #000; border-radius: 10px;
            transform-origin: bottom center; animation: wag 0.15s infinite alternate linear; z-index: -1;
        }
        @keyframes wag { 0% { transform: rotate(-35deg); } 100% { transform: rotate(35deg); } }


        /* --- UI & CONTROLS (Punk Style) --- */
        #hud {
            height: 40px; background: #ffe600; display: flex;
            justify-content: space-between; align-items: center;
            padding: 0 15px; color: #000; font-size: 1.2rem; font-weight: 900;
            border-bottom: 4px solid #fff; z-index: 50; text-transform: uppercase;
        }

        #controls {
            background: #111; padding: 15px; display: flex; flex-direction: column; gap: 10px;
            z-index: 10; position: relative; height: 220px;
        }

        #narrator {
            background: #000; color: #fff; padding: 10px; border: 3px solid #fff;
            font-size: 1.1rem; font-weight: 700; line-height: 1.3;
            min-height: 50px; box-shadow: 3px 3px 0px #00ffff;
        }
        .highlight { color: #ffe600; font-family: 'Bangers', cursive; font-size: 1.4rem; letter-spacing: 1px; }

        #button-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        .btn {
            background: #fff; color: #000; border: 3px solid #000;
            font-family: 'Bangers', cursive; font-size: 1.5rem; letter-spacing: 1px;
            cursor: pointer; padding: 10px 5px; transition: all 0.1s;
            box-shadow: 4px 4px 0px #000; text-transform: uppercase;
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }
        
        .btn-action { background: #00ffff; } 
        .btn-danger { background: #ff0055; color: white; } 

        /* Label for interactables */
        .label {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background: white; border: 2px solid black; padding: 2px 5px;
            font-family: 'Bangers', cursive; font-size: 1rem; white-space: nowrap;
            opacity: 0; transition: opacity 0.2s; pointer-events: none;
        }
        #old-man-container:hover .label, #squirrel:hover .label { opacity: 1; }

    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="hud">
            <div>HP: <span id="health-val" style="color:#ff0055;">100</span></div>
            <div>🎒 <span id="inventory-val" style="font-size:1rem;">EMPTY</span></div>
        </div>

        <div id="stage">
            <div id="sun"></div>
            <div id="clouds"></div>

            <div id="old-man-container" onclick="interact('oldman')">
                <div class="label">OLD MAN</div>
                <div id="bench"></div>
                <div id="old-man">
                    <div class="om-head"></div>
                    <div class="om-body"></div>
                    <div class="om-cane"></div>
                </div>
            </div>

            <div id="squirrel" onclick="interact('squirrel')">
                <div class="label" style="top: -35px;">SQUIRREL!</div>
            </div>

            <div id="dog-pov">
                <div class="dog-tail"></div>
                <div class="dog-ears">
                    <div class="ear"></div>
                    <div class="ear"></div>
                </div>
                <div class="dog-body"></div>
            </div>
        </div>

        <div id="controls">
            <div id="narrator"><span class="highlight">THE PARK:</span> The sun is shining. The clouds are moving. You smell trouble.</div>
            <div id="button-grid">
                <button class="btn btn-action" onclick="sniff()">🐾 SNIFF AIR</button>
                <button class="btn btn-action" onclick="bark()">🗣️ BARK</button>
            </div>
        </div>

    </div>

    <script>
        const narrator = document.getElementById('narrator');
        
        function sniff() {
            narrator.innerHTML = "You sniff the air. It smells like freshly cut grass and impending chaos.";
        }

        function bark() {
            narrator.innerHTML = "WOOF! A bird flies away in terror.";
            // Add a quick tail wag boost
            document.querySelector('.dog-tail').style.animationDuration = "0.05s";
            setTimeout(() => { document.querySelector('.dog-tail').style.animationDuration = "0.1s"; }, 1000);
        }

        function interact(target) {
            if(target === 'oldman') {
                narrator.innerHTML = "You approach the <span class="highlight">OLD MAN</span>. He smells like butterscotch. He nods slowly.";
            } else if (target === 'squirrel') {
                narrator.innerHTML = "You chase the <span class="highlight">SQUIRREL</span>! It's too fast, but you feel alive.";
            }
        }
    </script>
</body>
</html>
