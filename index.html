<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE FALL: DIRECTOR'S CUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --danger: #ff0022; --accent: #ffffff; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; touch-action: none; }
        #game-wrap { width: 100vw; height: 100vh; max-width: 500px; position: relative; background: #050505; border-left: 5px solid #111; border-right: 5px solid #111; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; font-family: 'Bangers', cursive; }
        .stat { color: #fff; font-size: 2.2rem; text-shadow: 4px 4px 0 #000; letter-spacing: 2px; }
        #death-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 8px solid var(--danger); padding: 40px; display: none; flex-direction: column; align-items: center; z-index: 200; width: 85%; border-radius: 15px; box-shadow: 0 0 80px rgba(255,0,34,0.6); }
        .btn-retry { background: #4ade80; color: #000; width: 100%; font-size: 3rem; padding: 15px; margin-top: 25px; border: 6px solid #000; cursor: pointer; font-family: 'Bangers'; text-transform: uppercase; box-shadow: 6px 6px 0 #fff; }
    </style>
</head>
<body>
    <div id="game-wrap">
        <div id="ui">
            <div class="stat">PTS: <span id="score-val">0</span></div>
            <div id="lvl-ui" class="stat" style="color:var(--danger)">CATHEDRAL</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="death-screen">
            <h2 style="color:#fff; font-size: 5rem; margin:0; text-shadow: 5px 5px 0 var(--danger);">WASTED</h2>
            <p id="final-score" style="color:var(--accent); font-size: 2.2rem; margin: 15px; font-family: 'Bangers';"></p>
            <button class="btn-retry" onclick="init()">REBOOT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const deathScreen = document.getElementById('death-screen');

        let width, height, player, platforms, particles, decors, score, gameActive, keys, deathTimer, loopId;
        
        const START_SPEED = 5.4; 
        const START_GAP = 390;
        let scrollSpeed = START_SPEED;
        let platformGap = START_GAP;
        let bgScroll = 0;
        let globalTime = 0;
        let shakeFrames = 0;

        function resize() {
            width = canvas.width = Math.min(window.innerWidth, 500);
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space' && !gameActive && deathTimer > 30) init(); });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        
        const handleInput = (clientX) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = (clientX - rect.left) * (width / rect.width);
        };

        canvas.addEventListener('touchstart', e => handleInput(e.touches[0].clientX), {passive:false});
        canvas.addEventListener('touchmove', e => { handleInput(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('mousedown', e => handleInput(e.clientX));
        canvas.addEventListener('mousemove', e => { if(e.buttons > 0) handleInput(e.clientX); });

        function createDecor(y, gapX, gapWidth) {
            let leftSpace = gapX;
            let rightSpace = width - (gapX + gapWidth);
            let newDecors = [];
            
            if (leftSpace > 90) newDecors.push({ x: gapX / 2, y: y, type: Math.random() > 0.4 ? 'CANDELABRA' : 'CURTAIN' });
            if (rightSpace > 90) newDecors.push({ x: gapX + gapWidth + (rightSpace / 2), y: y, type: Math.random() > 0.4 ? 'CANDELABRA' : 'CURTAIN' });
            return newDecors;
        }

        function init() {
            if (loopId) cancelAnimationFrame(loopId);
            gameActive = true; score = 0; deathTimer = 0; shakeFrames = 0;
            scrollSpeed = START_SPEED; bgScroll = 0;
            player = { x: width/2, targetX: width/2, y: -80, targetY: height/2.8, state: 'intro' };
            platforms = []; particles = []; decors = []; keys = {}; 
            scoreEl.innerText = "0";

            for(let i=0; i<8; i++) {
                let y = height + i * platformGap;
                let gapWidth = 95; // MUUUCH SMALLER GAP
                let gapX = Math.random()*(width - gapWidth - 40) + 20; 
                platforms.push({ y, gapX, gapWidth, scored: false });
                decors.push(...createDecor(y, gapX, gapWidth));
            }
            deathScreen.style.display = 'none';
            update();
        }

        // KILL BILL BLOOD ENGINE
        function triggerGore(x, y) {
            shakeFrames = 20; // Massive screen shake
            for(let i=0; i<250; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 25; // High velocity spray
                particles.push({ 
                    x: x, 
                    y: y, 
                    vx: Math.cos(angle) * speed, 
                    vy: (Math.sin(angle) * speed) - 10, // Burst upwards
                    life: 1.5 + Math.random(), 
                    size: Math.random() * 5 + 2,
                    splatted: false,
                    color: Math.random() > 0.5 ? '#ff0000' : '#880000' // Bright arterial + dark venous
                });
            }
        }

        function drawBackground() {
            ctx.fillStyle = "#070709"; 
            ctx.fillRect(0, 0, width, height);
            
            ctx.lineWidth = 2;
            let brickH = 60; let brickW = 100;
            let startY = (bgScroll % brickH) - brickH;

            for (let y = startY; y < height; y += brickH) {
                let offset = (Math.round(y / brickH) % 2 === 0) ? 0 : brickW / 2;
                for (let x = -brickW; x < width; x += brickW) {
                    ctx.fillStyle = (Math.abs(x*y) % 5 === 0) ? "#0d0d11" : "#121216";
                    ctx.fillRect(x + offset, y, brickW, brickH);
                    ctx.strokeStyle = "#000"; ctx.strokeRect(x + offset, y, brickW, brickH);
                    ctx.strokeStyle = "rgba(255,255,255,0.02)"; ctx.strokeRect(x + offset + 2, y + 2, brickW - 4, brickH - 4);
                }
            }
        }

        function drawDecor(d) {
            ctx.save(); ctx.translate(d.x, d.y);
            
            if (d.type === 'CANDELABRA') {
                // Chains
                ctx.strokeStyle = "#111"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, 50); ctx.stroke();
                
                // Ornate Iron Arms (Bezier Curves)
                ctx.strokeStyle = "#151515"; ctx.lineWidth = 6; ctx.lineCap = "round";
                ctx.beginPath();
                ctx.moveTo(0, 45); ctx.quadraticCurveTo(-45, 80, -35, 35); // Left arm
                ctx.moveTo(0, 45); ctx.quadraticCurveTo(45, 80, 35, 35);  // Right arm
                ctx.stroke();

                // Center Base
                ctx.fillStyle = "#111";
                ctx.beginPath(); ctx.moveTo(-15, 30); ctx.lineTo(15, 30); ctx.lineTo(0, 60); ctx.fill();

                // Candles (Tapered)
                const drawCandle = (cx, cy) => {
                    ctx.fillStyle = "#ddccaa";
                    ctx.beginPath(); ctx.moveTo(cx-4, cy); ctx.lineTo(cx+4, cy); ctx.lineTo(cx+3, cy-20); ctx.lineTo(cx-3, cy-20); ctx.fill();
                    
                    // Flame & Glow
                    let flicker = Math.sin(globalTime * 2 + cx) * 3;
                    ctx.fillStyle = "rgba(255, 150, 0, 0.9)";
                    ctx.shadowBlur = 20 + flicker; ctx.shadowColor = "#ff5500";
                    ctx.beginPath(); ctx.arc(cx, cy-25 + flicker/3, 5, 0, Math.PI * 2); ctx.fill();
                    // White hot center
                    ctx.fillStyle = "#fff"; ctx.shadowBlur = 0;
                    ctx.beginPath(); ctx.arc(cx, cy-24 + flicker/3, 2, 0, Math.PI * 2); ctx.fill();
                };
                
                drawCandle(-35, 35); drawCandle(0, 30); drawCandle(35, 35);

            } else if (d.type === 'CURTAIN') {
                // Heavy Draped Curtains
                let cw = 40; 
                
                // Back fold
                ctx.fillStyle = "#550000";
                ctx.beginPath(); ctx.moveTo(-cw, 0); ctx.lineTo(cw, 0); ctx.quadraticCurveTo(0, 80, 0, 110); ctx.fill();

                // Front folds
                ctx.fillStyle = "#880000";
                ctx.beginPath(); ctx.moveTo(-cw, 0); ctx.quadraticCurveTo(-cw/2, 60, -cw+10, 130); ctx.quadraticCurveTo(0, 100, cw/2, 0); ctx.fill();
                ctx.fillStyle = "#770000";
                ctx.beginPath(); ctx.moveTo(cw/2, 0); ctx.quadraticCurveTo(cw, 60, cw-10, 120); ctx.quadraticCurveTo(0, 90, -cw/4, 0); ctx.fill();

                // Gold Trim
                ctx.strokeStyle = "#cc9900"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(-cw, 0); ctx.quadraticCurveTo(-cw/2, 60, -cw+10, 130); ctx.stroke();
            }
            ctx.restore();
        }

        function drawPlatforms() {
            platforms.forEach(p => {
                ctx.fillStyle = "#111";
                ctx.fillRect(0, p.y, p.gapX, 35);
                ctx.fillRect(p.gapX + p.gapWidth, p.y, width, 35);
                
                ctx.fillStyle = "#1a1a1a";
                ctx.fillRect(0, p.y, p.gapX, 6);
                ctx.fillRect(p.gapX + p.gapWidth, p.y, width, 6);

                // NEON SPIKES
                ctx.save();
                ctx.shadowBlur = 15; ctx.shadowColor = "#ff0022"; ctx.fillStyle = "#ff0022";
                let spikeW = 16; let spikeH = 28;
                
                for(let i = 0; i < p.gapX - spikeW; i += spikeW) {
                    ctx.beginPath(); ctx.moveTo(i, p.y); ctx.lineTo(i + spikeW/2, p.y - spikeH); ctx.lineTo(i + spikeW, p.y); ctx.fill();
                }
                for(let i = p.gapX + p.gapWidth; i < width - spikeW; i += spikeW) {
                    ctx.beginPath(); ctx.moveTo(i, p.y); ctx.lineTo(i + spikeW/2, p.y - spikeH); ctx.lineTo(i + spikeW, p.y); ctx.fill();
                }
                ctx.restore();
            });
        }

        function update() {
            globalTime += 0.1;
            if (shakeFrames > 0) shakeFrames--;

            if (!gameActive) {
                deathTimer++;
                if (deathTimer === 90) { // Wait longer so we can admire the blood
                    document.getElementById('final-score').innerText = "PTS: " + score;
                    deathScreen.style.display = 'flex';
                }
            }
            
            if (player.state === 'intro') {
                player.y += (player.targetY - player.y) * 0.05;
                if (Math.abs(player.y - player.targetY) < 1) player.state = 'active';
            }
            
            if (gameActive) {
                player.x += (player.targetX - player.x) * 0.18;
                player.x = Math.max(15, Math.min(width - 15, player.x));
                
                bgScroll += scrollSpeed * 0.3; 
                platforms.forEach(p => p.y -= scrollSpeed);
                decors.forEach(d => d.y -= scrollSpeed);

                platforms.forEach(p => {
                    if (player.y + 20 > p.y && player.y < p.y + 10) {
                        if (player.x > p.gapX && player.x < p.gapX + p.gapWidth) {
                            if (!p.scored) { p.scored = true; score += 10; scrollSpeed += 0.04; }
                        } else {
                            gameActive = false; player.state = 'dead'; triggerGore(player.x, p.y);
                        }
                    }
                });

                if (platforms[0].y < -300) {
                    platforms.shift();
                    let y = platforms[platforms.length-1].y + platformGap;
                    let gapWidth = 95;
                    let gapX = Math.random()*(width - gapWidth - 40) + 20;
                    platforms.push({ y, gapX, gapWidth, scored: false });
                    decors.push(...createDecor(y, gapX, gapWidth));
                }
                decors = decors.filter(d => d.y > -150);
            }
            draw();
            loopId = requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            
            // Screen Shake Logic
            ctx.save();
            if (shakeFrames > 0) {
                let dx = (Math.random() - 0.5) * 20;
                let dy = (Math.random() - 0.5) * 20;
                ctx.translate(dx, dy);
            }

            drawBackground();
            decors.forEach(d => drawDecor(d));
            drawPlatforms();

            // BLOOD PARTICLES (Drawn under player, on top of platforms)
            particles.forEach((p, i) => {
                if (p.life > 0) {
                    ctx.fillStyle = p.color;
                    if (p.splatted) {
                        // Draw pooling blood
                        ctx.globalAlpha = p.life > 1 ? 1 : p.life;
                        ctx.beginPath(); ctx.ellipse(p.x, p.y, p.size * 2, p.size / 2, 0, 0, Math.PI*2); ctx.fill();
                        ctx.globalAlpha = 1;
                        p.y -= scrollSpeed; // Scroll with the platforms
                    } else {
                        // Draw flying, stretching blood
                        let stretch = Math.max(1, Math.abs(p.vy) * 0.2);
                        ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Math.atan2(p.vy, p.vx));
                        ctx.beginPath(); ctx.ellipse(0, 0, p.size * stretch, p.size, 0, 0, Math.PI*2); ctx.fill();
                        ctx.restore();
                        
                        // Physics
                        p.x += p.vx; p.y += p.vy; p.vy += 1.2; // Heavy Gravity
                        
                        // Floor collision
                        let hitFloor = platforms.find(plat => p.y >= plat.y && p.y <= plat.y + 20 && (p.x < plat.gapX || p.x > plat.gapX + plat.gapWidth));
                        if (hitFloor) {
                            p.splatted = true; p.y = hitFloor.y; p.vy = 0; p.vx = 0;
                        }
                    }
                    p.life -= 0.005; // Fade slowly
                } else {
                    particles.splice(i, 1);
                }
            });

            // PLAYER
            if (gameActive || deathTimer < 5) {
                ctx.save(); ctx.translate(player.x, player.y);
                ctx.shadowBlur = 15; ctx.shadowColor = "#fff"; ctx.strokeStyle = "#fff"; 
                ctx.lineWidth = 4; ctx.lineCap = "round";
                
                ctx.beginPath(); ctx.arc(0, -15, 7, 0, 7); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(0, -8); ctx.lineTo(0, 12); ctx.stroke(); 
                
                let flail = gameActive ? Math.sin(globalTime * 2) * 6 : 6;
                ctx.beginPath(); ctx.moveTo(-14, 2 + flail); ctx.lineTo(14, 2 - flail); ctx.stroke(); 
                ctx.beginPath(); ctx.moveTo(0, 12); ctx.lineTo(-10, 26); ctx.moveTo(0, 12); ctx.lineTo(10, 26); ctx.stroke(); 
                ctx.restore();
            }

            ctx.restore(); // Restore screen shake
            scoreEl.innerText = score;
        }

        init();
    </script>
</body>
</html>
