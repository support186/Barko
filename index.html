<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE PUNK FALL - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --danger: #ff0055; --accent: #00ffff; --bg: #222; }
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #111; 
            font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; 
        }
        #game-wrap {
            width: 100vw; height: 100vh; max-width: 500px; position: relative;
            background: #444; /* Concrete Gray */
            border-left: 6px solid #fff; border-right: 6px solid #fff;
            box-shadow: 0 0 50px rgba(255, 0, 85, 0.4);
        }
        canvas { display: block; width: 100%; height: 100%; }
        
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; padding: 15px;
            box-sizing: border-box; display: flex; justify-content: space-between;
            pointer-events: none; z-index: 10; font-family: 'Bangers', cursive;
        }
        .stat { color: #fff; font-size: 1.5rem; text-shadow: 3px 3px 0 #000; letter-spacing: 2px; }
        
        /* Minimalist End Screen */
        #death-screen {
            position: absolute; bottom: 10%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 3px solid #fff; padding: 15px;
            border-radius: 10px; display: none; flex-direction: column; align-items: center; z-index: 100;
            width: 70%; box-shadow: 8px 8px 0 var(--danger);
        }
        #death-screen h2 { color: var(--danger); margin: 0; font-size: 2.5rem; font-family: 'Bangers'; text-transform: uppercase; }
        
        #leaderboard-entry { width: 100%; display: none; flex-direction: column; align-items: center; margin-bottom: 10px;}
        input { padding: 8px; margin: 5px 0; border: 2px solid #fff; background: #000; color: #fff; width: 80%; font-size: 1rem; text-align: center; }
        
        .btn-retry { 
            background: #fff; color: #000; width: 100%; 
            font-size: 1.8rem; padding: 10px; margin-top: 5px;
            border: 4px solid #000; font-weight: 900; 
            cursor: pointer; font-family: 'Bangers'; text-transform: uppercase;
        }
        .btn-retry:active { transform: translate(3px, 3px); }
        
        button.small-btn { padding: 5px 10px; background: var(--accent); border: 2px solid #000; font-weight: 700; cursor: pointer; margin-top: 5px; font-family: 'Bangers'; }
    </style>
</head>
<body>

    <div id="game-wrap">
        <div id="ui">
            <div class="stat">SCORE: <span id="score">0</span></div>
            <div class="stat">BEST: <span id="best">0</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="death-screen">
            <h2>WASTED</h2>
            <p id="final-score" style="color:#fff; font-size: 1.2rem; margin: 5px; font-family: 'Bangers';"></p>
            
            <div id="leaderboard-entry">
                <input type="text" id="playerName" placeholder="TAG THE BOARD..." maxlength="12">
                <button class="small-btn" onclick="submitScore()">SAVE TAG</button>
            </div>

            <button class="btn-retry" onclick="init()">PLAY AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const deathScreen = document.getElementById('death-screen');
        const leaderboardSection = document.getElementById('leaderboard-entry');

        let width, height;
        // True Falling: Start player higher up, add velocity y
        let player = { x: 0, y: 50, vy: 0, r: 10, targetX: 0, state: 'falling' };
        let platforms = [];
        let particles = [];
        let debris = [];
        let score = 0;
        let floorsPassed = 0;
        let gameActive = true;
        let gravity = 0.15;
        let currentPlatformGap = 300; 
        let keys = {};
        let scores = JSON.parse(localStorage.getItem('fall_scores') || "[]");
        let deathTimer = 0;

        // Graffiti tags
        const tags = ["NO FUTURE", "RIOT", "BARKOUR", "NETLIFY", "2026", "☢️", "☠️"];

        function resize() {
            width = canvas.width = window.innerWidth > 500 ? 500 : window.innerWidth;
            height = canvas.height = window.innerHeight;
            player.x = width / 2;
            player.targetX = width / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if (e.code === 'Space' && !gameActive && player.state === 'dead') init();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        
        window.addEventListener('mousemove', (e) => { 
            if(gameActive) player.targetX = e.clientX - canvas.getBoundingClientRect().left; 
        });
        window.addEventListener('touchmove', (e) => { 
            if(gameActive) player.targetX = e.touches[0].clientX - canvas.getBoundingClientRect().left;
            e.preventDefault();
        }, {passive: false});

        function createPlatform(y) {
            const gapWidth = 110;
            const gapX = Math.random() * (width - gapWidth);
            platforms.push({ y, gapX, gapWidth, scored: false });
        }

        // Add debris to fly past
        function createDebris() {
            debris.push({
                x: Math.random() * width,
                y: height + 50,
                vy: - (Math.random() * 5 + 2),
                size: Math.random() * 20 + 5,
                type: Math.random() > 0.5 ? 'brick' : 'tag',
                text: tags[Math.floor(Math.random() * tags.length)]
            });
        }

        function createBlood(x, y, count=40, speed=12) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x, y, 
                    vx: (Math.random() - 0.5) * speed, 
                    vy: (Math.random() - 0.5) * speed,
                    life: 1.0,
                    size: Math.random() * 6 + 2,
                    color: `rgba(${255}, 0, ${Math.random()*100},`
                });
            }
        }

        function init() {
            platforms = [];
            debris = [];
            currentPlatformGap = 300; 
            for(let i=1; i<6; i++) createPlatform(height/2 + i * currentPlatformGap);
            score = 0;
            floorsPassed = 0;
            gameActive = true;
            player.y = 50;
            player.vy = 0;
            player.x = width / 2;
            player.targetX = width / 2;
            player.state = 'falling';
            particles = [];
            deathScreen.style.display = 'none';
            leaderboardSection.style.display = 'none';
            deathTimer = 0;
            update();
        }

        function update() {
            if (!gameActive && player.state === 'dead') return;

            // Handle death sequence timing
            if (!gameActive && player.state === 'impaled') {
                deathTimer++;
                if (deathTimer === 30) { // Cough 1
                    createBlood(player.x, player.y - 15, 10, 5); 
                }
                if (deathTimer === 60) { // Cough 2
                    createBlood(player.x, player.y - 15, 15, 7);
                }
                if (deathTimer > 100) {
                    player.state = 'dead';
                    endGame();
                }
                draw();
                requestAnimationFrame(update);
                return;
            }

            // Player Physics (True Falling)
            player.vy += gravity;
            player.y += player.vy;

            // Arrow Keys (Slower for precision)
            if (keys['ArrowLeft']) player.targetX -= 7;
            if (keys['ArrowRight']) player.targetX += 7;

            // Smooth Interpolation
            player.x += (player.targetX - player.x) * 0.1;

            if (player.x < 15) { player.x = 15; player.targetX = 15; }
            if (player.x > width - 15) { player.x = width - 15; player.targetX = width - 15; }

            // Move debris and platforms UP to simulate falling
            platforms.forEach(p => p.y -= player.vy * 0.5 + 2);
            debris.forEach(d => d.y += d.vy - player.vy * 0.5);

            if(Math.random() < 0.05) createDebris();

            // Collision Detection
            platforms.forEach(p => {
                // Land on platform
                if (player.vy > 0 && player.y + 30 > p.y && player.y < p.y + 10) {
                    if (player.x > p.gapX && player.x < p.gapX + p.gapWidth) {
                        // Safe through gap
                        if (!p.scored) {
                            p.scored = true;
                            score += 10;
                            floorsPassed++;
                        }
                    } else {
                        // HIT SPIKES
                        gameActive = false;
                        player.state = 'impaled';
                        player.vy = 0;
                        player.y = p.y - 15; // Latch onto spikes
                        createBlood(player.x, player.y + 20, 50, 15);
                    }
                }
            });

            // Cleanup & Spawn
            if (platforms.length > 0 && platforms[0].y < -100) {
                platforms.shift();
                createPlatform(platforms[platforms.length-1].y + currentPlatformGap);
            }
            debris = debris.filter(d => d.y > -100);

            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            // Draw Concrete Background with Graffiti
            ctx.fillStyle = '#444'; 
            ctx.fillRect(0, 0, width, height);
            
            // Draw static graffiti (only visible when falling past)
            ctx.font = '80px Bangers';
            ctx.fillStyle = 'rgba(255, 0, 0, 0.1)';
            ctx.fillText("NO FUTURE", 50, 300);
            ctx.fillText("RIOT", width - 150, 600);
            ctx.font = '40px Bangers';
            ctx.fillText("NETLIFY", 20, height - 100);

            // Draw Platforms (Dirty Bricks + Sharp Spikes)
            platforms.forEach(p => {
                ctx.fillStyle = '#333'; // Dark Brick
                ctx.fillRect(0, p.y, p.gapX, 30);
                ctx.fillRect(p.gapX + p.gapWidth, p.y, width - (p.gapX + p.gapWidth), 30);
                
                // Red Spikes
                ctx.fillStyle = var(--danger);
                for(let i=0; i<width; i+=15) {
                    if (i < p.gapX || i > p.gapX + p.gapWidth) {
                        ctx.beginPath();
                        ctx.moveTo(i, p.y);
                        ctx.lineTo(i+7, p.y - 15);
                        ctx.lineTo(i+14, p.y);
                        ctx.fill();
                    }
                }
            });

            // Draw Debris
            debris.forEach(d => {
                if(d.type === 'brick') {
                    ctx.fillStyle = '#555';
                    ctx.fillRect(d.x, d.y, d.size, d.size/2);
                } else {
                    ctx.font = `${d.size}px Space Grotesk`;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                    ctx.fillText(d.text, d.x, d.y);
                }
            });

            // Draw Stick Man
            ctx.strokeStyle = player.state === 'falling' ? 'white' : var(--danger);
            ctx.lineWidth = 4;
            const px = player.x;
            const py = player.y;

            if (player.state === 'falling') {
                // Head
                ctx.beginPath(); ctx.arc(px, py - 10, 7, 0, Math.PI * 2); ctx.stroke();
                // Body & Arms (Flailing)
                ctx.beginPath();
                ctx.moveTo(px, py - 3); ctx.lineTo(px, py + 15);
                ctx.moveTo(px - 10, py - 5); ctx.lineTo(px + 10, py + 10); // Arm 1
                ctx.moveTo(px + 10, py - 5); ctx.lineTo(px - 10, py + 10); // Arm 2
                // Legs
                ctx.moveTo(px, py + 15); ctx.lineTo(px - 7, py + 28);
                ctx.moveTo(px, py + 15); ctx.lineTo(px + 7, py + 28);
                ctx.stroke();
            } else {
                // Impaled on side
                ctx.translate(px, py);
                ctx.rotate(Math.PI / 2);
                // Head
                ctx.beginPath(); ctx.arc(0, -10, 7, 0, Math.PI * 2); ctx.stroke();
                // Body
                ctx.beginPath();
                ctx.moveTo(0, -3); ctx.lineTo(0, 15);
                ctx.moveTo(-8, 5); ctx.lineTo(8, 5);
                ctx.moveTo(0, 15); ctx.lineTo(-7, 28);
                ctx.moveTo(0, 15); ctx.lineTo(7, 28);
                ctx.stroke();
                ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform
            }

            // Draw Blood & Drip
            particles.forEach((p, i) => {
                ctx.fillStyle = `${p.color}${p.life})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // Gravity on blood
                p.life -= 0.015;
                if(p.life <= 0) particles.splice(i, 1);
            });
            scoreEl.innerText = score;
        }

        function endGame() {
            document.getElementById('final-score').innerText = "FINAL SCORE: " + score;
            deathScreen.style.display = 'flex';
            
            const isTopTen = scores.length < 10 || score > (scores[scores.length - 1]?.val || 0);
            if (isTopTen) {
                leaderboardSection.style.display = 'flex';
            }

            if (score > parseInt(localStorage.getItem('fall_best') || 0)) {
                localStorage.setItem('fall_best', score);
                bestEl.innerText = score;
            }
        }

        function submitScore() {
            const name = document.getElementById('playerName').value || "UNKOWN";
            scores.push({name, val: score});
            scores.sort((a,b) => b.val - a.val);
            scores = scores.slice(0, 10);
            localStorage.setItem('fall_scores', JSON.stringify(scores));
            leaderboardSection.style.display = 'none';
        }

        bestEl.innerText = localStorage.getItem('fall_best') || 0;
        init();
    </script>
</body>
</html>
