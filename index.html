<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE FALL: RAW SPRITE BUILD</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { --danger: #ff0044; --accent: #ffffff; }
        body { margin: 0; padding: 0; overflow: hidden; background: #000; font-family: 'Space Grotesk', sans-serif; display: flex; justify-content: center; touch-action: none; }
        #game-wrap { width: 100vw; height: 100vh; max-width: 500px; position: relative; background: #050505; border-left: 5px solid #222; border-right: 5px solid #222; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; cursor: none; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; box-sizing: border-box; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; font-family: 'Bangers', cursive; }
        .stat { color: #fff; font-size: 2.2rem; text-shadow: 4px 4px 0 #000; letter-spacing: 2px; }
        #death-screen { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); border: 8px solid var(--danger); padding: 40px; display: none; flex-direction: column; align-items: center; z-index: 200; width: 85%; border-radius: 15px; box-shadow: 0 0 50px rgba(255,0,68,0.5); }
        .btn-retry { background: #4ade80; color: #000; width: 100%; font-size: 3rem; padding: 15px; margin-top: 25px; border: 6px solid #000; cursor: pointer; font-family: 'Bangers'; text-transform: uppercase; box-shadow: 6px 6px 0 #fff; }
    </style>
</head>
<body>
    <div id="game-wrap">
        <div id="ui">
            <div class="stat">PTS: <span id="score-val">0</span></div>
            <div id="lvl-ui" class="stat" style="color:var(--danger)">CATHEDRAL</div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="death-screen">
            <h2 style="color:#fff; font-size: 5rem; margin:0; text-shadow: 5px 5px 0 var(--danger);">WASTED</h2>
            <p id="final-score" style="color:var(--accent); font-size: 2.2rem; margin: 15px; font-family: 'Bangers';"></p>
            <button class="btn-retry" onclick="init()">REBOOT</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        const deathScreen = document.getElementById('death-screen');

        let width, height, player, platforms, particles, score, floorsPassed, gameActive, keys, deathTimer, loopId;
        
        const START_SPEED = 5.4; 
        const START_GAP = 390;
        let scrollSpeed = START_SPEED;
        let platformGap = START_GAP;
        let bgScroll = 0;

        // --- BYPASS BROWSER SECURITY WITH RAW GITHUB URLS ---
        const RAW_URL = "https://raw.githubusercontent.com/support186/Barko/main/";
        const images = { bg: new Image(), spike: new Image(), base: new Image(), player: new Image() };
        
        // This forces the browser to download the exact raw files, ignoring MIME type mismatch
        images.bg.src = RAW_URL + "bg_cathedral.png"; 
        images.spike.src = RAW_URL + "spike_glow.png";
        images.base.src = RAW_URL + "platform_base.png";
        images.player.src = RAW_URL + "player_idle.png";

        function resize() {
            width = canvas.width = Math.min(window.innerWidth, 500);
            height = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code === 'Space' && !gameActive) init(); });
        window.addEventListener('keyup', e => { keys[e.code] = false; });
        
        const handleInput = (clientX) => {
            if(!gameActive) return;
            const rect = canvas.getBoundingClientRect();
            player.targetX = (clientX - rect.left) * (width / rect.width);
        };

        canvas.addEventListener('touchstart', e => handleInput(e.touches[0].clientX), {passive:false});
        canvas.addEventListener('touchmove', e => { handleInput(e.touches[0].clientX); e.preventDefault(); }, {passive:false});
        canvas.addEventListener('mousedown', e => handleInput(e.clientX));
        canvas.addEventListener('mousemove', e => { if(e.buttons > 0) handleInput(e.clientX); });

        function init() {
            if (loopId) cancelAnimationFrame(loopId);
            gameActive = true; score = 0; floorsPassed = 0; deathTimer = 0; 
            scrollSpeed = START_SPEED; bgScroll = 0;
            player = { x: width/2, targetX: width/2, y: -80, targetY: height/2.8, state: 'intro' };
            platforms = []; particles = []; keys = {}; 
            scoreEl.innerText = "0";

            for(let i=0; i<8; i++) {
                let y = height + i * platformGap;
                platforms.push({ y, gapX: Math.random()*(width-180)+20, gapWidth: 155, scored: false });
            }
            deathScreen.style.display = 'none';
            update();
        }

        function createParticles(x, y) {
            for(let i=0; i<40; i++) particles.push({ x: x, y: y, vx: (Math.random()-0.5)*15, vy: (Math.random()-0.5)*15, life: 1 });
        }

        function update() {
            if (!gameActive) {
                deathTimer++;
                if (deathTimer === 60) {
                    document.getElementById('final-score').innerText = "PTS: " + score;
                    deathScreen.style.display = 'flex';
                }
            }
            if (player.state === 'intro') {
                player.y += (player.targetY - player.y) * 0.05;
                if (Math.abs(player.y - player.targetY) < 1) player.state = 'active';
            }
            if (gameActive) {
                player.x += (player.targetX - player.x) * 0.18;
                player.x = Math.max(25, Math.min(width - 25, player.x));
                
                bgScroll += scrollSpeed * 0.5;
                platforms.forEach(p => p.y -= scrollSpeed);

                platforms.forEach(p => {
                    if (player.y + 20 > p.y && player.y < p.y + 10) {
                        if (player.x > p.gapX && player.x < p.gapX + p.gapWidth) {
                            if (!p.scored) { p.scored = true; score += 10; floorsPassed++; scrollSpeed += 0.04; }
                        } else {
                            gameActive = false; player.state = 'dead'; createParticles(player.x, p.y);
                        }
                    }
                });

                if (platforms[0].y < -300) {
                    platforms.shift();
                    platforms.push({ y: platforms[platforms.length-1].y + platformGap, gapX: Math.random()*(width-180)+20, gapWidth: 155, scored: false });
                }
            }
            draw();
            loopId = requestAnimationFrame(update);
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);

            if (images.bg.complete && images.bg.naturalWidth !== 0) {
                let bgH = (width / images.bg.width) * images.bg.height; 
                let yOffset = bgScroll % bgH;
                ctx.drawImage(images.bg, 0, -yOffset, width, bgH);
                ctx.drawImage(images.bg, 0, bgH - yOffset, width, bgH);
            } else {
                ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0,0,width,height);
            }

            platforms.forEach(p => {
                let platformHeight = 120; let spikeHeight = 40;     

                ctx.save(); ctx.beginPath(); ctx.rect(0, p.y, p.gapX, platformHeight); ctx.clip(); 
                if (images.base.complete && images.base.naturalWidth !== 0) ctx.drawImage(images.base, 0, p.y, width, platformHeight);
                else { ctx.fillStyle = "#000"; ctx.fillRect(0, p.y, width, platformHeight); }
                ctx.restore();

                ctx.save(); ctx.beginPath(); ctx.rect(0, p.y - spikeHeight, p.gapX, spikeHeight); ctx.clip();
                if (images.spike.complete && images.spike.naturalWidth !== 0) ctx.drawImage(images.spike, 0, p.y - spikeHeight, width, spikeHeight);
                else { ctx.fillStyle = "#ff0044"; ctx.fillRect(0, p.y - spikeHeight, width, spikeHeight); }
                ctx.restore();

                ctx.save(); ctx.beginPath(); ctx.rect(p.gapX + p.gapWidth, p.y, width, platformHeight); ctx.clip(); 
                if (images.base.complete && images.base.naturalWidth !== 0) ctx.drawImage(images.base, 0, p.y, width, platformHeight);
                ctx.restore();

                ctx.save(); ctx.beginPath(); ctx.rect(p.gapX + p.gapWidth, p.y - spikeHeight, width, spikeHeight); ctx.clip();
                if (images.spike.complete && images.spike.naturalWidth !== 0) ctx.drawImage(images.spike, 0, p.y - spikeHeight, width, spikeHeight);
                ctx.restore();
            });

            ctx.save(); ctx.translate(player.x, player.y);
            if (!gameActive) ctx.rotate(Math.PI / 1.7);
            
            if (images.player.complete && images.player.naturalWidth !== 0) {
                ctx.drawImage(images.player, -25, -25, 50, 50);
            } else {
                ctx.strokeStyle = gameActive ? "#fff" : "#f00"; ctx.lineWidth = 5;
                ctx.beginPath(); ctx.arc(0, -15, 8, 0, 7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, -7); ctx.lineTo(0, 15); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(-15, 5); ctx.lineTo(15, 5); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, 15); ctx.lineTo(-10, 30); ctx.moveTo(0, 15); ctx.lineTo(10, 30); ctx.stroke();
            }
            ctx.restore();

            particles.forEach((p, i) => {
                ctx.fillStyle = `rgba(255, 0, 68, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, 7); ctx.fill();
                p.x += p.vx; p.y += p.vy; p.vy += 0.4; p.life -= 0.03;
                if (p.life <= 0) particles.splice(i, 1);
            });
            scoreEl.innerText = score;
        }

        init();
    </script>
</body>
</html>
